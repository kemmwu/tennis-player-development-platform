[tool.ruff]
line-length = 100
target-version = "py312"
builtins = ["spark", "dbutils", "display", "sc", "sqlContext"]

exclude = [
    ".venv",
    "typings/",
    "tennis_analytics/target",
    "tennis_analytics/dbt_packages",
    "ingestion/",
    "extraction/",
]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501", "F403"]

# tennis_ingestion_pipeline
# Databricks Workflow definition for documentation purposes
# Actual workflow is configured in Databricks UI

name: tennis_ingestion_pipeline
schedule:
  quartz_cron_expression: "0 0/30 * * * ?"
  timezone_id: "America/Los_Angeles"

email_notifications:
  on_failure:
    - kemmwu@gmail.com

tasks:
  - task_key: ingest_students
    notebook_task:
      notebook_path: /Workspace/Users/kemmwu@gmail.com/ingestion/bronze_students
    job_cluster_key: serverless

  - task_key: ingest_match_stats
    depends_on:
      - task_key: ingest_students
    notebook_task:
      notebook_path: /Workspace/Users/kemmwu@gmail.com/ingestion/bronze_match_stats
    job_cluster_key: serverless

  - task_key: ingest_training_sessions
    depends_on:
      - task_key: ingest_match_stats
    notebook_task:
      notebook_path: /Workspace/Users/kemmwu@gmail.com/ingestion/bronze_training_sessions
    job_cluster_key: serverless

  - task_key: ingest_students_stream
      notebook_task:
        notebook_path: /Workspace/Users/kemmwu@gmail.com/ingestion/bronze_students_stream
      job_cluster_key: serverless
      # No depends_on — runs independently from batch path
  - task_key: ingest_screenshots
      notebook_task:
        notebook_path: /Workspace/Users/kemmwu@gmail.com/ingestion/bronze_screenshots
      job_cluster_key: serverless
      depends_on:
        - task_key: ingest_students

  - task_key: extract_sessions
    notebook_task:
      notebook_path: /Workspace/Users/kemmwu@gmail.com/extraction/extract_sessions
    job_cluster_key: serverless
    depends_on:
      - task_key: ingest_screenshots

  - task_key: llm_quality_auditor
    notebook_task:
      notebook_path: /Workspace/Users/kemmwu@gmail.com/extraction/llm_quality_auditor
    job_cluster_key: serverless
    depends_on:
      - task_key: extract_sessions